worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # The docs are served under /diamond/docs (Astro base path). The static
        # output lives at html/diamond/docs, so full-path requests resolve
        # directly — the reverse proxy (Coolify/Traefik) forwards without
        # stripping the prefix. Astro uses directory format: .../button/ -> index.html
        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        # Convenience: bare host root redirects into the docs base.
        location = / {
            return 302 /diamond/docs/;
        }

        # Hashed, content-addressed assets — cache hard.
        location /diamond/docs/_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        error_page 404 /diamond/docs/404.html;
    }
}
