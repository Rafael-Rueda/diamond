<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Widgets Gallery — 66 Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="widgets/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-source="widgets/variants.jsx">
/* Widgets Gallery — Variants */
const { useState } = React;

/* =============== 01. RICH TEXT EDITOR =============== */
const Rte1 = () => <div className="rte"><div className="rte-tb">{['B','I','U','S'].map((b,i)=><button key={b} className={i===0?'on':''} style={{fontWeight: b==='B'?700:400, fontStyle: b==='I'?'italic':'normal', textDecoration: b==='U'?'underline':b==='S'?'line-through':'none'}}>{b}</button>)}<span className="sep"/>{['≡','⋮≡','⋮='].map(b=><button key={b}>{b}</button>)}<span className="sep"/>{['🔗','{ }'].map(b=><button key={b}>{b}</button>)}</div><div className="rte-body"><b>Diamond</b> is a <i>systematic</i> design toolkit with <a>linked references</a> and semantic formatting.</div></div>;
const Rte2 = () => <div className="rte"><div className="rte-tb" style={{gap:6}}><select style={{fontSize:11, border:'1px solid var(--border)', borderRadius:4, padding:'3px 6px', background:'var(--surface)'}}><option>Heading 1</option></select><select style={{fontSize:11, border:'1px solid var(--border)', borderRadius:4, padding:'3px 6px', background:'var(--surface)'}}><option>Inter</option></select><span className="sep"/><button className="on" style={{fontWeight:700}}>B</button><button style={{fontStyle:'italic'}}>I</button></div><div className="rte-body"><div style={{fontFamily:'Fraunces,serif', fontSize:16, fontWeight:500, fontStyle:'italic', marginBottom:4}}>On quiet craft.</div>A measured essay on the discipline of shipping.</div></div>;
const Rte3 = () => <div className="rte"><div className="rte-tb" style={{justifyContent:'center', background:'var(--fg)'}}>{['B','I','U','·','“','🔗'].map((b,i)=><button key={i} style={{color:'var(--bg)', fontWeight: b==='B'?700:400, fontStyle: b==='I'?'italic':'normal'}}>{b}</button>)}</div><div className="rte-body" style={{padding:'14px 16px', fontFamily:'Fraunces,serif', fontSize:14, fontStyle:'italic', lineHeight:1.7}}>"<b>Perfection is achieved</b> not when there is nothing more to add..."</div></div>;
const Rte4 = () => <div className="rte"><div className="rte-body" style={{position:'relative', minHeight:120, padding:'20px 14px'}}><div style={{position:'absolute', top:4, left:14, background:'var(--surface)', padding:'2px 6px', display:'flex', gap:1, boxShadow:'0 2px 8px rgba(0,0,0,0.08)', border:'1px solid var(--border)', borderRadius:6}}>{['B','I','S','🔗'].map(b=><button key={b} style={{width:22, height:22, border:'none', background:'transparent', fontWeight: b==='B'?700:400}}>{b}</button>)}</div>Select text to reveal the <b>floating</b> toolbar above.</div></div>;
const Rte5 = () => <div className="rte" style={{fontFamily:'JetBrains Mono,monospace'}}><div className="rte-tb" style={{background:'#0f0f0e', fontSize:10, gap:4}}>{['**B**','*i*','~~s~~','`c`','[link]','> quote'].map(b=><button key={b} style={{color:'#d4d0c8', padding:'0 6px', width:'auto'}}>{b}</button>)}</div><div className="rte-body" style={{background:'#1a1917', color:'#d4d0c8', fontSize:10}}># Diamond{'\n'}A <span style={{color:'#c084fc'}}>**systematic**</span> toolkit.{'\n'}- List item{'\n'}- [link](diamond.co)</div></div>;
const Rte6 = () => <div className="rte"><div className="rte-tb" style={{background:'var(--bg)', padding:'8px 12px', gap:8, borderColor:'transparent'}}><span style={{fontSize:10, color:'var(--fg-3)', fontFamily:'JetBrains Mono,monospace'}}>COLLAB · 3 editing</span><div style={{display:'flex', marginLeft:'auto'}}><span style={{width:18, height:18, borderRadius:'50%', background:'var(--accent)', marginLeft:-4, border:'2px solid var(--surface)'}}/><span style={{width:18, height:18, borderRadius:'50%', background:'#10b981', marginLeft:-4, border:'2px solid var(--surface)'}}/><span style={{width:18, height:18, borderRadius:'50%', background:'#f59e0b', marginLeft:-4, border:'2px solid var(--surface)'}}/></div></div><div className="rte-body">The team is drafting <span style={{background:'color-mix(in oklab, var(--accent) 15%, white)', borderBottom:'2px solid var(--accent)', padding:'0 2px'}}>v3.2 release notes</span> live.</div></div>;

/* =============== 02. COMMAND PALETTE =============== */
const Cmd1 = () => <div className="cmdp"><div className="cmdp-input"><span style={{color:'var(--fg-3)'}}>⌕</span><input defaultValue="proj"/><span className="kbd">⌘K</span></div><div className="cmdp-list"><div className="cmdp-group">PROJECTS</div><div className="cmdp-item on"><span className="ic">◆</span>Open Diamond v3.2<span className="hk">↵</span></div><div className="cmdp-item"><span className="ic">◇</span>Open Atlas<span className="hk">⌘1</span></div><div className="cmdp-group">ACTIONS</div><div className="cmdp-item"><span className="ic">＋</span>New project<span className="hk">⌘N</span></div></div></div>;
const Cmd2 = () => <div className="cmdp"><div className="cmdp-input" style={{padding:'12px 14px'}}><span style={{color:'var(--accent)', fontSize:14}}>≫</span><input placeholder="Type a command or search…"/></div><div className="cmdp-list"><div className="cmdp-group">SUGGESTED</div>{['Create document','Invite team','Open settings'].map((l,i)=><div key={l} className={`cmdp-item ${i===0?'on':''}`}><span className="ic">{['📄','👥','⚙'][i]}</span>{l}</div>)}</div></div>;
const Cmd3 = () => <div className="cmdp" style={{fontFamily:'JetBrains Mono,monospace', background:'#0f0f0e', color:'#d4d0c8', borderColor:'#2d2c28'}}><div className="cmdp-input" style={{borderColor:'#2d2c28', padding:'8px 10px'}}><span style={{color:'var(--accent)'}}>$</span><input defaultValue="git: " style={{color:'#d4d0c8', fontFamily:'inherit'}}/><span style={{fontSize:9, color:'#6b6862'}}>[ESC]</span></div><div className="cmdp-list">{['commit','checkout','push','pull'].map((l,i)=><div key={l} className={`cmdp-item ${i===0?'on':''}`} style={{fontSize:11, padding:'4px 10px', background:i===0?'rgba(43,127,255,0.15)':'transparent', color:i===0?'var(--accent)':'#d4d0c8'}}><span style={{color:'#6b6862'}}>git</span>{l}<span style={{marginLeft:'auto', fontSize:9, color:'#6b6862'}}>→</span></div>)}</div></div>;
const Cmd4 = () => <div className="cmdp"><div className="cmdp-input"><span style={{color:'var(--fg-3)'}}>⌕</span><input defaultValue="jump"/></div><div className="cmdp-list"><div className="cmdp-group">JUMP TO</div>{[['⌘ 1','Dashboard'],['⌘ 2','Projects'],['⌘ 3','Team'],['⌘ 4','Billing']].map(([k,l],i)=><div key={l} className={`cmdp-item ${i===1?'on':''}`}><span className="hk" style={{marginLeft:0, marginRight:6}}>{k}</span>{l}</div>)}</div></div>;
const Cmd5 = () => <div className="cmdp"><div className="cmdp-input"><span style={{color:'var(--fg-3)'}}>⌕</span><input defaultValue="ari"/></div><div className="cmdp-list"><div className="cmdp-group">PEOPLE</div>{[['AC','Aria Chen','Design'],['AL','Alex Lee','Eng']].map(([a,n,r],i)=><div key={n} className={`cmdp-item ${i===0?'on':''}`}><span style={{width:22, height:22, borderRadius:'50%', background:'var(--accent)', color:'white', fontSize:9, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:600}}>{a}</span>{n}<span style={{fontSize:9, color:'var(--fg-3)', marginLeft:'auto'}}>{r}</span></div>)}</div></div>;
const Cmd6 = () => <div className="cmdp" style={{borderRadius:16}}><div className="cmdp-input" style={{padding:'14px 16px', borderBottom:'none'}}><span style={{fontFamily:'Fraunces,serif', fontStyle:'italic', fontSize:14, color:'var(--fg-3)'}}>Ask Diamond</span><input placeholder="Summarise this quarter…" style={{fontFamily:'Fraunces,serif', fontStyle:'italic', fontSize:14}}/><span className="kbd">↵</span></div><div style={{padding:'0 14px 12px', display:'flex', gap:6, flexWrap:'wrap'}}>{['Draft a brief','Find files','Run a report'].map(s=><span key={s} style={{padding:'3px 10px', background:'var(--bg-2)', borderRadius:999, fontSize:10, cursor:'pointer'}}>{s}</span>)}</div></div>;

/* =============== 03. MAP =============== */
const MapSvg = (props) => <svg viewBox="0 0 200 150" {...props}><rect width="200" height="150" fill="#e8e3d8"/><path d="M0,100 Q40,95 80,100 T160,95 L200,98 L200,150 L0,150 Z" fill="#c8d4c0"/><path d="M0,80 Q50,70 100,75 T200,70" fill="none" stroke="#b5c2a8" strokeWidth="0.5"/><path d="M20,0 L28,50 L80,60 L100,40 L140,50 L160,30 L180,0" fill="none" stroke="#d0c4a8" strokeWidth="1.5"/><path d="M0,120 L60,115 L100,125 L160,120 L200,128" fill="none" stroke="var(--accent)" strokeWidth="1.5"/></svg>;
const Mp1 = () => <div className="map"><MapSvg/><div className="overlay" style={{top:10, left:10}}><b>San Francisco</b><div style={{color:'var(--fg-3)', fontSize:9}}>37.7749° N</div></div><div style={{position:'absolute', top:'45%', left:'40%', width:18, height:18, borderRadius:'50% 50% 50% 0', transform:'rotate(-45deg)', background:'var(--accent)', border:'2px solid white', boxShadow:'0 2px 4px rgba(0,0,0,0.2)'}}/></div>;
const Mp2 = () => <div className="map"><MapSvg/>{[[30,40,'A'],[55,60,'B'],[75,30,'C'],[45,80,'D']].map(([x,y,l])=><div key={l} style={{position:'absolute', top:`${y}%`, left:`${x}%`, width:22, height:22, borderRadius:'50%', background:'var(--accent)', color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, border:'2px solid white', boxShadow:'0 2px 6px rgba(0,0,0,0.2)'}}>{l}</div>)}<div className="overlay" style={{bottom:10, right:10, fontSize:9}}>4 LOCATIONS</div></div>;
const Mp3 = () => <div className="map" style={{background:'#1a1917'}}><svg viewBox="0 0 200 150" style={{width:'100%', height:'100%'}}><rect width="200" height="150" fill="#1a1917"/><path d="M0,80 L60,75 L100,85 L160,80 L200,88" fill="none" stroke="var(--accent)" strokeWidth="1.5"/><path d="M20,0 L28,50 L80,60 L100,40 L140,50 L160,30 L180,0" fill="none" stroke="#3d3c38" strokeWidth="1.5"/><circle cx="100" cy="75" r="3" fill="var(--accent)"/><circle cx="100" cy="75" r="12" fill="none" stroke="var(--accent)" strokeWidth="0.5" opacity="0.5"/></svg><div className="overlay" style={{top:10, left:10, background:'#0f0f0e', color:'#d4d0c8'}}>Dark style<div style={{color:'#6b6862', fontSize:9}}>Mapbox GL</div></div></div>;
const Mp4 = () => <div className="map"><MapSvg/><svg viewBox="0 0 200 150" style={{position:'absolute', inset:0}}><path d="M20,110 C 50,100 60,60 90,50 C 120,40 140,50 170,30" fill="none" stroke="var(--accent)" strokeWidth="2" strokeDasharray="3,2"/></svg>{[[20,110,'A'],[170,30,'B']].map(([x,y,l])=><div key={l} style={{position:'absolute', left:`${x/2}%`, top:`${y/1.5}%`, width:18, height:18, borderRadius:'50%', background:'white', border:'2px solid var(--accent)', color:'var(--accent)', fontSize:10, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center'}}>{l}</div>)}<div className="overlay" style={{bottom:8, left:8}}><b>4.2 mi</b> · 14 min</div></div>;
const Mp5 = () => <div className="map"><svg viewBox="0 0 200 150" style={{width:'100%', height:'100%'}}><rect width="200" height="150" fill="#e8e3d8"/><defs><radialGradient id="hm1"><stop offset="0%" stopColor="var(--accent)" stopOpacity="0.6"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></radialGradient></defs>{[[60,50,30],[130,70,40],[100,100,25],[40,90,20]].map(([x,y,r],i)=><circle key={i} cx={x} cy={y} r={r} fill="url(#hm1)"/>)}</svg><div className="overlay" style={{top:10, left:10}}><b>Density</b><div style={{fontSize:9, color:'var(--fg-3)'}}>Orders · 24h</div></div></div>;
const Mp6 = () => <div className="map"><MapSvg/><div style={{position:'absolute', bottom:12, left:12, right:12, background:'var(--surface)', padding:'8px 10px', borderRadius:6, display:'flex', gap:10, alignItems:'center', boxShadow:'0 4px 10px rgba(0,0,0,0.1)'}}><div style={{width:36, height:36, borderRadius:8, background:'linear-gradient(135deg, #c4948a, #a9b8c0)'}}/><div style={{flex:1, fontSize:10}}><div style={{fontWeight:700, fontSize:11}}>Atlas Café</div><div style={{color:'var(--fg-3)'}}>412 Valencia · ⋆ 4.8</div></div><button style={{padding:'4px 10px', background:'var(--accent)', color:'white', border:'none', borderRadius:4, fontSize:10, fontFamily:'inherit'}}>Go →</button></div></div>;

/* =============== 04. CHARTS =============== */
const Ch1 = () => <div className="chart"><div className="chart-hd"><span>Revenue · 6 months</span><span style={{color:'var(--success)'}}>+24%</span></div><div className="chart-body"><svg viewBox="0 0 200 80" style={{width:'100%', height:'100%'}}><defs><linearGradient id="la1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs><polyline fill="url(#la1)" stroke="none" points="0,60 30,45 60,50 90,30 120,35 150,18 180,22 200,12 200,80 0,80"/><polyline fill="none" stroke="var(--accent)" strokeWidth="1.5" points="0,60 30,45 60,50 90,30 120,35 150,18 180,22 200,12"/></svg></div></div>;
const Ch2 = () => <div className="chart"><div className="chart-hd"><span>Users by channel</span></div><div className="chart-body"><svg viewBox="0 0 200 80" style={{width:'100%', height:'100%'}}>{[65,45,72,38,58,50,70].map((h,i)=><rect key={i} x={i*26+4} y={80-h} width="20" height={h} fill={i===3?'var(--accent)':'color-mix(in oklab, var(--accent) 30%, white)'} rx="2"/>)}</svg></div></div>;
const Ch3 = () => <div className="chart"><div className="chart-hd"><span>Market split</span></div><div className="chart-body" style={{display:'flex', alignItems:'center', gap:12, padding:14}}><svg viewBox="0 0 40 40" style={{width:90, height:90}}><circle cx="20" cy="20" r="16" fill="none" stroke="var(--bg-2)" strokeWidth="8"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--accent)" strokeWidth="8" strokeDasharray="48 100" transform="rotate(-90 20 20)"/><circle cx="20" cy="20" r="16" fill="none" stroke="#8b5cf6" strokeWidth="8" strokeDasharray="28 100" strokeDashoffset="-48" transform="rotate(-90 20 20)"/><circle cx="20" cy="20" r="16" fill="none" stroke="#f59e0b" strokeWidth="8" strokeDasharray="24 100" strokeDashoffset="-76" transform="rotate(-90 20 20)"/></svg><div style={{fontSize:10, display:'flex', flexDirection:'column', gap:4}}>{[['Pro','48%','var(--accent)'],['Team','28%','#8b5cf6'],['Free','24%','#f59e0b']].map(([l,p,c])=><div key={l} style={{display:'flex', gap:6, alignItems:'center'}}><span style={{width:8, height:8, background:c, borderRadius:2}}/><span>{l}</span><b style={{marginLeft:'auto'}}>{p}</b></div>)}</div></div></div>;
const Ch4 = () => <div className="chart"><div className="chart-hd"><span>User segments</span></div><div className="chart-body"><svg viewBox="0 0 200 80" style={{width:'100%', height:'100%'}}>{Array.from({length:30}).map((_,i)=><circle key={i} cx={20+Math.random()*160} cy={10+Math.random()*60} r={2+Math.random()*4} fill="var(--accent)" opacity={0.3+Math.random()*0.5}/>)}<line x1="0" y1="40" x2="200" y2="40" stroke="var(--border)" strokeDasharray="2"/></svg></div></div>;
const Ch5 = () => <div className="chart"><div className="chart-hd"><span>Revenue vs. Target</span></div><div className="chart-body"><svg viewBox="0 0 200 80" style={{width:'100%', height:'100%'}}>{[50,60,72,58,80].map((h,i)=><g key={i}><rect x={i*38+4} y="20" width="16" height="60" fill="var(--bg-2)" rx="2"/><rect x={i*38+4} y={80-h} width="16" height={h} fill="var(--accent)" rx="2"/><line x1={i*38+2} y1="30" x2={i*38+22} y2="30" stroke="var(--danger)" strokeDasharray="2" strokeWidth="1"/></g>)}</svg></div></div>;
const Ch6 = () => <div className="chart"><div className="chart-hd"><span>Performance radar</span></div><div className="chart-body"><svg viewBox="0 0 120 100" style={{width:'100%', height:'100%'}}><g transform="translate(60,50)">{[40,30,20,10].map(r=><polygon key={r} points={[0,-r,r*0.95,-r*0.31,r*0.59,r*0.81,-r*0.59,r*0.81,-r*0.95,-r*0.31].join(' ')} fill="none" stroke="var(--border)" strokeWidth="0.5"/>)}<polygon points="0,-34 32,-11 20,28 -18,25 -28,-9" fill="color-mix(in oklab, var(--accent) 30%, white)" stroke="var(--accent)" strokeWidth="1.5"/></g></svg></div></div>;

/* =============== 05. TRANSFER LIST =============== */
const Tr1 = () => <div className="tl"><div className="tl-col"><div className="hd"><span>Available</span><span>4</span></div><div className="body">{['Aria','Beatriz','Cam','Dana'].map((n,i)=><div key={n} className={`it ${i===1?'on':''}`}><input type="checkbox" defaultChecked={i===1} style={{accentColor:'var(--accent)'}}/>{n}</div>)}</div></div><div className="tl-ar"><button>→</button><button>⇒</button><button>←</button><button>⇐</button></div><div className="tl-col"><div className="hd"><span>Selected</span><span>2</span></div><div className="body">{['Leo','Mei'].map(n=><div key={n} className="it"><input type="checkbox" style={{accentColor:'var(--accent)'}}/>{n}</div>)}</div></div></div>;
const Tr2 = () => <div className="tl"><div className="tl-col"><div className="hd">Modules</div><div className="body">{['Auth','Billing','Analytics'].map((m,i)=><div key={m} className="it" style={{gap:8}}><span style={{color:'var(--fg-3)'}}>⋮⋮</span>{m}<span style={{marginLeft:'auto', color:'var(--fg-3)'}}>›</span></div>)}</div></div><div className="tl-ar"><button>⇋</button></div><div className="tl-col" style={{background:'color-mix(in oklab, var(--accent) 5%, white)'}}><div className="hd" style={{background:'color-mix(in oklab, var(--accent) 12%, white)', color:'var(--accent)'}}>In plan</div><div className="body">{['Dashboard','Team'].map(m=><div key={m} className="it on">◆ {m}</div>)}</div></div></div>;
const Tr3 = () => <div className="tl" style={{gridTemplateColumns:'1fr 1fr', gap:12}}><div className="tl-col"><div className="hd">Rejected ⦶</div><div className="body">{['Feature A','Feature B'].map(f=><div key={f} className="it" style={{color:'var(--fg-3)', textDecoration:'line-through'}}>{f}</div>)}</div></div><div className="tl-col" style={{borderColor:'var(--success)'}}><div className="hd" style={{background:'color-mix(in oklab, var(--success) 12%, white)', color:'var(--success)'}}>Approved ✓</div><div className="body">{['Search','Filter','Export'].map(f=><div key={f} className="it">{f}</div>)}</div></div></div>;
const Tr4 = () => <div className="tl"><div className="tl-col"><div className="hd">Pool (8)</div><div className="body" style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:2}}>{Array.from({length:8}).map((_,i)=><div key={i} style={{aspectRatio:1, borderRadius:'50%', background:`hsl(${i*45} 50% 70%)`, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:10, fontWeight:700, cursor:'pointer'}}>{String.fromCharCode(65+i)}</div>)}</div></div><div className="tl-ar"><button>→</button></div><div className="tl-col"><div className="hd">Team (3)</div><div className="body" style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:2}}>{['A','C','F'].map(c=><div key={c} style={{aspectRatio:1, borderRadius:'50%', background:'var(--accent)', color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700}}>{c}</div>)}</div></div></div>;
const Tr5 = () => <div style={{width:'100%', display:'flex', flexDirection:'column', gap:8}}><input placeholder="Filter both columns…" style={{padding:'6px 10px', border:'1px solid var(--border)', borderRadius:6, fontSize:11, fontFamily:'inherit'}}/><div className="tl"><div className="tl-col"><div className="hd"><span>All</span><input type="checkbox" style={{accentColor:'var(--accent)'}}/></div><div className="body">{['Alpha','Beta','Gamma'].map(n=><div key={n} className="it"><input type="checkbox" style={{accentColor:'var(--accent)'}}/>{n}</div>)}</div></div><div className="tl-ar"><button>→</button><button>←</button></div><div className="tl-col"><div className="hd">Picked</div><div className="body">{['Delta'].map(n=><div key={n} className="it on">{n}</div>)}</div></div></div></div>;

<script type="text/babel" data-source="widgets/app.jsx">
/* Widgets Gallery — App */
const TWEAKS = /*EDITMODE-BEGIN*/{"accent":"#2b7fff","radius":10,"font":"Inter","bg":"warm"}/*EDITMODE-END*/;
const SWATCHES = ['#2b7fff','#e11d48','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16','#6366f1','#d97757','#0ea5e9','#f43f5e','#22c55e','#1a1917'];
const FONTS = ['Inter','Space Grotesk','Fraunces','JetBrains Mono'];
const BGS = {
  warm:  { bg:'#f5f3ef', bg2:'#ebe8e1', surface:'#ffffff', border:'#d9d5cc', border2:'#c4bfb3', fg:'#1a1917', fg2:'#6b6862', fg3:'#9a968e' },
  paper: { bg:'#ffffff', bg2:'#f5f5f4', surface:'#ffffff', border:'#e5e5e4', border2:'#d4d4d2', fg:'#0a0a0a', fg2:'#525252', fg3:'#a3a3a3' },
  cool:  { bg:'#f0f4f8', bg2:'#e3eaf2', surface:'#ffffff', border:'#cfd9e4', border2:'#b8c4d2', fg:'#0f172a', fg2:'#475569', fg3:'#94a3b8' },
  sand:  { bg:'#faf7f2', bg2:'#f0eadf', surface:'#ffffff', border:'#e6dfd0', border2:'#cdc4b3', fg:'#2b2418', fg2:'#6e6553', fg3:'#a29783' },
};
function applyTweaks(t) {
  const r = document.documentElement;
  r.style.setProperty('--accent', t.accent);
  r.style.setProperty('--radius', t.radius + 'px');
  r.style.setProperty('--font', `'${t.font}'`);
  const bg = BGS[t.bg] || BGS.warm;
  const map = { bg:'--bg', bg2:'--bg-2', surface:'--surface', border:'--border', border2:'--border-2', fg:'--fg', fg2:'--fg-2', fg3:'--fg-3' };
  Object.entries(bg).forEach(([k,v])=>r.style.setProperty(map[k],v));
}
function Tweaks({ t, setT, onClose }) {
  const up = (k, v) => { const n={...t,[k]:v}; setT(n); applyTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); };
  return (
    <div className="tweaks">
      <div className="tweaks-header"><span className="title">◆ Tweaks</span><button className="close" onClick={onClose}>×</button></div>
      <div className="tweaks-body">
        <div className="tweaks-row"><label>Accent <span className="val">{t.accent}</span></label><div className="swatches">{SWATCHES.map(c=><div key={c} className={`swatch ${t.accent===c?'active':''}`} style={{background:c}} onClick={()=>up('accent',c)}/>)}</div></div>
        <div className="tweaks-row"><label>Radius <span className="val">{t.radius}px</span></label><input type="range" min="0" max="24" value={t.radius} onChange={e=>up('radius', +e.target.value)}/></div>
        <div className="tweaks-row"><label>Font <span className="val">{t.font}</span></label><div className="font-picker">{FONTS.map(f=><button key={f} className={`font-btn ${t.font===f?'active':''}`} style={{fontFamily:f}} onClick={()=>up('font',f)}>{f}</button>)}</div></div>
        <div className="tweaks-row"><label>Palette <span className="val">{t.bg}</span></label><div className="font-picker" style={{gridTemplateColumns:'repeat(4,1fr)'}}>{Object.keys(BGS).map(b=><button key={b} className={`font-btn ${t.bg===b?'active':''}`} onClick={()=>up('bg',b)}>{b}</button>)}</div></div>
      </div>
    </div>
  );
}
function App() {
  const { useState, useEffect } = React;
  const [t, setT] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    applyTweaks(t);
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') { setEditMode(true); setTweaksOpen(true); }
      if (e.data?.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const cats = window.CATEGORIES;
  const total = cats.reduce((n,c)=>n+c.v.length, 0);
  return (
    <div className="page">
      <div className="header">
        <h1>Advanced<br/><em>widgets.</em></h1>
        <div className="sub">{total} complex interaction patterns across {cats.length} families — editors, command bars, maps, charts, and specialty viewers.</div>
      </div>
      <div className="meta-row">
        <span><span className="dot"/>{cats.length} Categories</span>
        <span><span className="dot"/>{total} Variants</span>
        <span><span className="dot"/>Live tweakable</span>
        <span style={{marginLeft:'auto'}}>Vol. 08 · Diamond · 2026</span>
      </div>
      <div className="toc">
        {cats.map((c,i)=>(<a key={c.k} href={`#sec-${c.k}`}><span>{c.n}</span><span className="n">{String(i+1).padStart(2,'0')} / 6</span></a>))}
      </div>
      {cats.map((c, ci) => (
        <section key={c.k} id={`sec-${c.k}`} className="section" data-screen-label={`${String(ci+1).padStart(2,'0')} ${c.n}`}>
          <div className="section-head"><span className="num">§{String(ci+1).padStart(2,'0')}</span><h2>{c.n}</h2><span className="desc">{c.desc} · {c.v.length} variations</span></div>
          <div className="grid">
            {c.v.map((V, i) => (
              <div key={i} className="cell">
                <span className="label">{c.k}-{String(i+1).padStart(2,'0')}</span>
                <span className="idx">{String(ci+1).padStart(2,'0')}·{i+1}</span>
                <div className="stage"><V/></div>
                <div className="footnote">{c.notes[i]}</div>
              </div>
            ))}
          </div>
        </section>
      ))}
      <div style={{marginTop:100, paddingTop:32, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', fontFamily:'JetBrains Mono, monospace', fontSize:11, textTransform:'uppercase', letterSpacing:'0.14em', color:'var(--fg-2)'}}>
        <span>— Fin —</span>
        <span>{total} widget patterns · {cats.length} sections</span>
        <span>Toggle Tweaks to customize</span>
      </div>
      {editMode && tweaksOpen && <Tweaks t={t} setT={setT} onClose={()=>setTweaksOpen(false)}/>}
      {editMode && !tweaksOpen && <button className="fab" onClick={()=>setTweaksOpen(true)}>◆</button>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
