  paper: { bg:'#ffffff', bg2:'#f5f5f4', surface:'#ffffff', border:'#e5e5e4', border2:'#d4d4d2', fg:'#0a0a0a', fg2:'#525252', fg3:'#a3a3a3' },
  cool:  { bg:'#f0f4f8', bg2:'#e3eaf2', surface:'#ffffff', border:'#cfd9e4', border2:'#b8c4d2', fg:'#0f172a', fg2:'#475569', fg3:'#94a3b8' },
  sand:  { bg:'#faf7f2', bg2:'#f0eadf', surface:'#ffffff', border:'#e6dfd0', border2:'#cdc4b3', fg:'#2b2418', fg2:'#6e6553', fg3:'#a29783' },
};
function applyTweaks(t) {
  const r = document.documentElement;
  r.style.setProperty('--accent', t.accent);
  r.style.setProperty('--radius', t.radius + 'px');
  r.style.setProperty('--font', `'${t.font}'`);
  const bg = BGS[t.bg] || BGS.warm;
  const map = { bg:'--bg', bg2:'--bg-2', surface:'--surface', border:'--border', border2:'--border-2', fg:'--fg', fg2:'--fg-2', fg3:'--fg-3' };
  Object.entries(bg).forEach(([k,v])=>r.style.setProperty(map[k],v));
}
function Tweaks({ t, setT, onClose }) {
  const up = (k, v) => { const n={...t,[k]:v}; setT(n); applyTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); };
  return (
    <div className="tweaks">
      <div className="tweaks-header"><span className="title">◆ Tweaks</span><button className="close" onClick={onClose}>×</button></div>
      <div className="tweaks-body">
        <div className="tweaks-row"><label>Accent <span className="val">{t.accent}</span></label><div className="swatches">{SWATCHES.map(c=><div key={c} className={`swatch ${t.accent===c?'active':''}`} style={{background:c}} onClick={()=>up('accent',c)}/>)}</div></div>
        <div className="tweaks-row"><label>Radius <span className="val">{t.radius}px</span></label><input type="range" min="0" max="24" value={t.radius} onChange={e=>up('radius', +e.target.value)}/></div>
        <div className="tweaks-row"><label>Font <span className="val">{t.font}</span></label><div className="font-picker">{FONTS.map(f=><button key={f} className={`font-btn ${t.font===f?'active':''}`} style={{fontFamily:f}} onClick={()=>up('font',f)}>{f}</button>)}</div></div>
        <div className="tweaks-row"><label>Palette <span className="val">{t.bg}</span></label><div className="font-picker" style={{gridTemplateColumns:'repeat(4,1fr)'}}>{Object.keys(BGS).map(b=><button key={b} className={`font-btn ${t.bg===b?'active':''}`} onClick={()=>up('bg',b)}>{b}</button>)}</div></div>
      </div>
    </div>
  );
}
function App() {
  const { useState, useEffect } = React;
  const [t, setT] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    applyTweaks(t);
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') { setEditMode(true); setTweaksOpen(true); }
      if (e.data?.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const cats = window.CATEGORIES;
  const total = cats.reduce((n,c)=>n+c.v.length, 0);
  const groups = [
    { title: 'I. Primary Surfaces', idx: [0,1,2] },
    { title: 'II. Wayfinding', idx: [3,4,5,6] },
    { title: 'III. Anchors & Actions', idx: [7,8,9,10,11] },
    { title: 'IV. Structural', idx: [12,13,14] },
  ];
  return (
    <div className="page">
      <div className="header">
        <h1>Navigation<br/><em>& wayfinding.</em></h1>
        <div className="sub">A systematic catalogue of {total} navigation patterns across {cats.length} families — the surfaces, trails, and menus that help people find their way.</div>
      </div>
      <div className="meta-row">
        <span><span className="dot"/>{cats.length} Categories</span>
        <span><span className="dot"/>{total} Variants</span>
        <span><span className="dot"/>{groups.length} Thematic Groups</span>
        <span><span className="dot"/>Live tweakable</span>
        <span style={{marginLeft:'auto'}}>Vol. 06 · Diamond · 2026</span>
      </div>
      <div className="toc">
        {cats.map((c,i)=>(<a key={c.k} href={`#sec-${c.k}`}><span>{c.n}</span><span className="n">{String(i+1).padStart(2,'0')} / 6</span></a>))}
      </div>
      {groups.map((g, gi) => (
        <div key={g.title}>
          <div style={{margin:'100px 0 0', paddingBottom:14, borderBottom:'2px solid var(--fg)', display:'flex', alignItems:'baseline', gap:20, flexWrap:'wrap'}}>
            <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, letterSpacing:'0.2em', color:'var(--accent)'}}>GROUP {String(gi+1).padStart(2,'0')}</span>
            <span style={{fontFamily:'Fraunces, serif', fontSize:28, fontStyle:'italic', fontWeight:500, letterSpacing:'-0.02em'}}>{g.title}</span>
            <span style={{marginLeft:'auto', fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--fg-3)', letterSpacing:'0.14em', textTransform:'uppercase'}}>{g.idx.map(i=>cats[i].n).join(' · ')}</span>
          </div>
          {g.idx.map(ci => {
            const c = cats[ci];
            return (
              <section key={c.k} id={`sec-${c.k}`} className="section" data-screen-label={`${String(ci+1).padStart(2,'0')} ${c.n}`}>
                <div className="section-head"><span className="num">§{String(ci+1).padStart(2,'0')}</span><h2>{c.n}</h2><span className="desc">{c.desc} · {c.v.length} variations</span></div>
                <div className="grid">
                  {c.v.map((V, i) => (
                    <div key={i} className="cell">
                      <span className="label">{c.k}-{String(i+1).padStart(2,'0')}</span>
                      <span className="idx">{String(ci+1).padStart(2,'0')}·{i+1}</span>
                      <div className="stage"><V/></div>
                      <div className="footnote">{c.notes[i]}</div>
                    </div>
                  ))}
                </div>
              </section>
            );
          })}
        </div>
      ))}
      <div style={{marginTop:100, paddingTop:32, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', fontFamily:'JetBrains Mono, monospace', fontSize:11, textTransform:'uppercase', letterSpacing:'0.14em', color:'var(--fg-2)'}}>
        <span>— Fin —</span>
        <span>{total} nav patterns · {cats.length} sections</span>
        <span>Toggle Tweaks to customize</span>
      </div>
      {editMode && tweaksOpen && <Tweaks t={t} setT={setT} onClose={()=>setTweaksOpen(false)}/>}
      {editMode && !tweaksOpen && <button className="fab" onClick={()=>setTweaksOpen(true)}>◆</button>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
