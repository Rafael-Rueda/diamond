const Tb3 = () => <table className="tb"><thead><tr><th>#</th><th>Task</th><th>Owner</th></tr></thead><tbody>{[[1,'Audit design','AR'],[2,'Prepare review','LR'],[3,'Ship v2','MT']].map((r,i)=><tr key={i} style={{background:i%2?'var(--bg-2)':'transparent'}}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody></table>;
const Tb4 = () => <table className="tb" style={{fontFamily:'JetBrains Mono,monospace'}}><thead><tr><th>TS</th><th>EVENT</th><th>LVL</th></tr></thead><tbody>{[['14:02','deploy started','info'],['14:05','tests passed','ok'],['14:07','live','ok']].map((r,i)=><tr key={i}><td style={{fontSize:10}}>{r[0]}</td><td>{r[1]}</td><td><span style={{padding:'1px 5px', background: r[2]==='ok'?'color-mix(in oklab, var(--success) 20%, white)':'var(--bg-2)', color: r[2]==='ok'?'var(--success)':'var(--fg-2)', borderRadius:3, fontSize:9}}>{r[2]}</span></td></tr>)}</tbody></table>;

/* =============== 03. DATA GRID =============== */

const Dg4 = () => <div className="dg"><div className="dg-tb" style={{background:'var(--bg-2)'}}><strong style={{fontSize:10}}>3 selected</strong><span style={{color:'var(--accent)', marginLeft:6, cursor:'pointer'}}>Archive</span><span style={{color:'var(--accent)', marginLeft:6, cursor:'pointer'}}>Delete</span><span className="chip" style={{marginLeft:'auto'}}>Clear</span></div><table><thead><tr><th>File</th><th>Size</th><th>Modified</th></tr></thead><tbody>{[['brief.md','12 KB','2d'],['atlas.fig','4.2 MB','3d'],['notes.txt','3 KB','5d']].map((r,i)=><tr key={i} style={{background:'color-mix(in oklab, var(--accent) 8%, white)'}}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody></table></div>;

/* =============== 04. LIST =============== */
const Ls1 = () => <div className="ls">{['Inbox','Starred','Sent','Drafts','Archive'].map((l,i)=><div key={l} className="ls-item"><span>{['📥','★','✉','📝','📦'][i]}</span><span style={{flex:1}}>{l}</span><span style={{fontSize:10, color:'var(--fg-3)'}}>{['12','3','','5',''][i]}</span></div>)}</div>;

const Ls3 = () => <div className="ls">{['Design tokens','Components','Patterns'].map((l,i)=><div key={l} className="ls-item"><div className="av sm" style={{background:['#f59e0b','#10b981','#8b5cf6'][i]}}>{l[0]}</div><div style={{flex:1}}><div style={{fontWeight:600, fontSize:11}}>{l}</div><div style={{fontSize:9, color:'var(--fg-3)'}}>{['42 tokens','86 components','24 patterns'][i]}</div></div><span style={{color:'var(--fg-3)', fontSize:11}}>›</span></div>)}</div>;
const Ls4 = () => <div className="ls" style={{fontFamily:'JetBrains Mono,monospace', background:'#0f0f0e', color:'#d4d0c8', borderColor:'#2d2c28'}}>{['init','bootstrap','run','deploy'].map((l,i)=><div key={l} className="ls-item" style={{borderColor:'#2d2c28', fontSize:10}}><span style={{color:'#6b6862'}}>$</span><span>{l}</span><span style={{marginLeft:'auto', color:'#059669'}}>✓</span></div>)}</div>;
const Ls5 = () => <div className="ls" style={{border:'none'}}>{['Essay I','Essay II','Essay III'].map((l,i)=><div key={l} className="ls-item" style={{flexDirection:'column', alignItems:'flex-start', borderBottom:'1px solid var(--border)', padding:'10px 0', gap:2}}><div style={{fontFamily:'Fraunces,serif', fontSize:15, fontStyle:'italic'}}>{l}</div><div style={{fontSize:9, color:'var(--fg-3)'}}>MAR · APR · MAY 2026</div></div>)}</div>;
const Ls6 = () => <div className="ls">{['Music','Photos','Videos'].map((l,i)=><div key={l} className="ls-item" style={{justifyContent:'space-between'}}><div style={{display:'flex', gap:10, alignItems:'center'}}><div style={{width:26, height:26, borderRadius:6, background:'color-mix(in oklab, var(--accent) 15%, white)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12}}>{['♪','📷','▶'][i]}</div><div><div style={{fontSize:11, fontWeight:600}}>{l}</div><div style={{fontSize:9, color:'var(--fg-3)'}}>{[842, 1250, 48][i]} items</div></div></div><input type="checkbox" defaultChecked={i<2} style={{accentColor:'var(--accent)'}}/></div>)}</div>;

/* =============== 05. LIST ITEM =============== */
const Li1 = () => <div style={{width:'100%', display:'flex', flexDirection:'column', gap:4}}>{[{t:'Basic',s:'Simple row with label'},{t:'With badge',s:'Trailing count'},{t:'Selected',s:'Highlighted state'}].map((it,i)=><div key={i} className="ls-item" style={{border:'1px solid var(--border)', borderRadius:6, background: i===2?'color-mix(in oklab, var(--accent) 10%, white)':'var(--surface)'}}><span style={{flex:1, fontWeight: i===2?600:400}}>{it.t}</span>{i===1 && <span className="bd" style={{background:'var(--fg)'}}>8</span>}{i===2 && <span style={{color:'var(--accent)'}}>✓</span>}</div>)}</div>;
const Li2 = () => <div className="ls-item" style={{width:'100%', border:'1px solid var(--border)', borderRadius:8, padding:10}}><div className="av sm">JM</div><div style={{flex:1}}><div style={{fontSize:11, fontWeight:600}}>James M.</div><div style={{fontSize:10, color:'var(--fg-3)'}}>Product designer · SF</div></div><button style={{padding:'3px 10px', border:'1px solid var(--border)', background:'var(--surface)', borderRadius:999, fontSize:10, fontFamily:'inherit'}}>Follow</button></div>;
const Li3 = () => <div className="ls-item" style={{width:'100%', border:'1px solid var(--border)', borderRadius:6, gap:12}}><div style={{width:40, height:40, borderRadius:6, ...IMG(...GRADS[2])}}/><div style={{flex:1}}><div style={{fontSize:11, fontWeight:600}}>Autumn jacket</div><div style={{fontSize:10, color:'var(--fg-3)'}}>Size M · Earth</div></div><div style={{fontFamily:'JetBrains Mono,monospace', fontSize:11}}>$148</div></div>;
const Li4 = () => <div className="ls-item" style={{width:'100%', border:'1px solid var(--border)', borderRadius:6}}><span style={{width:18, height:18, borderRadius:4, background:'color-mix(in oklab, var(--accent) 15%, white)', color:'var(--accent)', fontSize:10, display:'flex', alignItems:'center', justifyContent:'center'}}>✓</span><span style={{flex:1, textDecoration:'line-through', color:'var(--fg-3)'}}>Prepare brief</span><span style={{fontSize:9, color:'var(--fg-3)'}}>Apr 22</span></div>;
const Li5 = () => <div className="ls-item" style={{width:'100%', borderLeft:'3px solid var(--accent)', background:'var(--bg-2)', borderRadius:'0 6px 6px 0', alignItems:'flex-start', flexDirection:'column', gap:2}}><div style={{display:'flex', width:'100%', alignItems:'center', gap:8}}><span style={{fontSize:9, fontFamily:'JetBrains Mono,monospace', color:'var(--fg-3)', letterSpacing:'0.1em'}}>APR 24</span><span style={{flex:1, fontWeight:600, fontSize:11}}>Design review</span><span style={{fontSize:9, color:'var(--accent)'}}>● Live</span></div><div style={{fontSize:10, color:'var(--fg-2)'}}>2:00 — 3:00 PM · Room 4B</div></div>;
const Li6 = () => <div className="ls-item" style={{width:'100%', border:'1px solid var(--border)', borderRadius:6}}><span style={{cursor:'grab', color:'var(--fg-3)'}}>⋮⋮</span><span style={{flex:1}}>Drag to reorder</span><span style={{fontSize:9, color:'var(--fg-3)', fontFamily:'JetBrains Mono,monospace'}}>01 / 08</span></div>;

/* =============== 06. ACCORDION =============== */

const Ac4 = () => <div className="ac">{[['I. Prelude','A measured beginning.',true],['II. Theme',''],['III. Coda','']].map(([t,c,open],i)=><div key={i} className="ac-item"><div className="ac-head" style={{padding:'10px 0', fontFamily:'Fraunces,serif', fontSize:14, fontStyle:'italic'}}>{t}<span className="chev" style={{transform: open?'rotate(90deg)':'none', color: open?'var(--accent)':'var(--fg-3)'}}>›</span></div>{open && <div className="ac-body" style={{padding:'4px 0 10px', fontStyle:'italic'}}>{c}</div>}</div>)}</div>;
const Ac5 = () => <div className="ac">{[['Design',8,true],['Engineering',12],['Operations',3]].map(([t,c,open],i)=><div key={i} className="ac-item"><div className="ac-head"><span style={{display:'flex', gap:8, alignItems:'center'}}><span style={{width:8, height:8, borderRadius:'50%', background:['#8b5cf6','#2b7fff','#f59e0b'][i]}}/>{t}</span><span style={{display:'flex', gap:6, alignItems:'center'}}><span style={{fontSize:9, padding:'1px 6px', background:'var(--bg-2)', borderRadius:10}}>{c}</span><span className="chev" style={{transform: open?'rotate(90deg)':'none'}}>›</span></span></div>{open && <div className="ac-body">Aria Chen, Leo Reyes, + 6 more.</div>}</div>)}</div>;

  { n:'Calendar', k:'ca', desc:'Month / week view', notes:['Month w/ events','Monospace italic','Week schedule','Event list','Year heatmap','Range selection'], v:[Ca1,Ca2,Ca3,Ca4,Ca5,Ca6] },
  { n:'Statistic', k:'st', desc:'Key metric display', notes:['KPI + delta','Paired metrics','Dark w/ sparkline','Large editorial','Goal progress','Mini grid'], v:[St1,St2,St3,St4,St5,St6] },
  { n:'Image', k:'im', desc:'Image wrapper', notes:['Aspect ratio','With caption','Pair','Circular','Badge overlay','Framed print'], v:[Im1,Im2,Im3,Im4,Im5,Im6] },
  { n:'Video Player', k:'vp', desc:'Video wrapper', notes:['Standard controls','Live stream','Vertical portrait','Rec overlay','Editorial poster','Speed + accent'], v:[Vp1,Vp2,Vp3,Vp4,Vp5,Vp6] },
  { n:'Audio Player', k:'ap', desc:'Audio wrapper', notes:['Minimal','Podcast row','Waveform','Live radio','Playlist','Pill compact'], v:[Ap1,Ap2,Ap3,Ap4,Ap5,Ap6] },
  { n:'Code Block', k:'cb', desc:'Formatted code', notes:['Dark w/ filename','Light terminal','Line numbers','Diff view','Build output','Editorial quote'], v:[Cb1,Cb2,Cb3,Cb4,Cb5,Cb6] },
  { n:'Kbd', k:'kb', desc:'Keyboard key', notes:['Inline hint','Special widths','Dark modifiers','Key cluster','Shortcut list','Large accent'], v:[Kb1,Kb2,Kb3,Kb4,Kb5,Kb6] },
  { n:'Chat Bubble', k:'bb', desc:'Message container', notes:['Basic exchange','With avatar + time','Typing indicator','Media attachment','iMessage style','Terminal chat'], v:[Bb1,Bb2,Bb3,Bb4,Bb5,Bb6] },
  { n:'Kanban', k:'kn', desc:'Column board', notes:['Classic three','Active column hilite','Two-column mine/team','Checkbox tasks','4-col compact','Priority inbox'], v:[Kn1,Kn2,Kn3,Kn4,Kn5,Kn6] },
  { n:'Pricing Table', k:'pr', desc:'Tier comparison', notes:['Starter card','Pro featured','Stacked rows','Enterprise dark','Toggle billing','Discount callout'], v:[Pr1,Pr2,Pr3,Pr4,Pr5,Pr6] },
];

</script>
<script type="text/babel" data-source="display/app.jsx">
/* Display Gallery — App */
const TWEAKS = /*EDITMODE-BEGIN*/{"accent":"#2b7fff","radius":10,"font":"Inter","bg":"warm"}/*EDITMODE-END*/;
const SWATCHES = ['#2b7fff','#e11d48','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16','#6366f1','#d97757','#0ea5e9','#f43f5e','#22c55e','#1a1917'];
const FONTS = ['Inter','Space Grotesk','Fraunces','JetBrains Mono'];
const BGS = {
  warm:  { bg:'#f5f3ef', bg2:'#ebe8e1', surface:'#ffffff', border:'#d9d5cc', border2:'#c4bfb3', fg:'#1a1917', fg2:'#6b6862', fg3:'#9a968e' },
  paper: { bg:'#ffffff', bg2:'#f5f5f4', surface:'#ffffff', border:'#e5e5e4', border2:'#d4d4d2', fg:'#0a0a0a', fg2:'#525252', fg3:'#a3a3a3' },
  cool:  { bg:'#f0f4f8', bg2:'#e3eaf2', surface:'#ffffff', border:'#cfd9e4', border2:'#b8c4d2', fg:'#0f172a', fg2:'#475569', fg3:'#94a3b8' },
  sand:  { bg:'#faf7f2', bg2:'#f0eadf', surface:'#ffffff', border:'#e6dfd0', border2:'#cdc4b3', fg:'#2b2418', fg2:'#6e6553', fg3:'#a29783' },
};
function applyTweaks(t) {
  const r = document.documentElement;
  r.style.setProperty('--accent', t.accent);
  r.style.setProperty('--radius', t.radius + 'px');
  r.style.setProperty('--font', `'${t.font}'`);
  const bg = BGS[t.bg] || BGS.warm;
  const map = { bg:'--bg', bg2:'--bg-2', surface:'--surface', border:'--border', border2:'--border-2', fg:'--fg', fg2:'--fg-2', fg3:'--fg-3' };
  Object.entries(bg).forEach(([k,v])=>r.style.setProperty(map[k],v));
}
function Tweaks({ t, setT, onClose }) {
  const up = (k, v) => { const n={...t,[k]:v}; setT(n); applyTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); };
  return (
    <div className="tweaks">
      <div className="tweaks-header"><span className="title">◆ Tweaks</span><button className="close" onClick={onClose}>×</button></div>
      <div className="tweaks-body">
        <div className="tweaks-row"><label>Accent <span className="val">{t.accent}</span></label><div className="swatches">{SWATCHES.map(c=><div key={c} className={`swatch ${t.accent===c?'active':''}`} style={{background:c}} onClick={()=>up('accent',c)}/>)}</div></div>
        <div className="tweaks-row"><label>Radius <span className="val">{t.radius}px</span></label><input type="range" min="0" max="24" value={t.radius} onChange={e=>up('radius', +e.target.value)}/></div>
        <div className="tweaks-row"><label>Font <span className="val">{t.font}</span></label><div className="font-picker">{FONTS.map(f=><button key={f} className={`font-btn ${t.font===f?'active':''}`} style={{fontFamily:f}} onClick={()=>up('font',f)}>{f}</button>)}</div></div>
        <div className="tweaks-row"><label>Palette <span className="val">{t.bg}</span></label><div className="font-picker" style={{gridTemplateColumns:'repeat(4,1fr)'}}>{Object.keys(BGS).map(b=><button key={b} className={`font-btn ${t.bg===b?'active':''}`} onClick={()=>up('bg',b)}>{b}</button>)}</div></div>
      </div>
    </div>
  );
}
function App() {
  const { useState, useEffect } = React;
  const [t, setT] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    applyTweaks(t);
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') { setEditMode(true); setTweaksOpen(true); }
      if (e.data?.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const cats = window.CATEGORIES;
  const total = cats.reduce((n,c)=>n+c.v.length, 0);
  const groups = [
    { title: 'I. Surfaces & Containers', idx: [0,3,4,5] },
    { title: 'II. Data & Tables', idx: [1,2] },
    { title: 'III. Identity & Labels', idx: [6,7,8,9,10] },
    { title: 'IV. Temporal & Spatial', idx: [11,12,13,14] },
    { title: 'V. Media', idx: [15,16,17] },
    { title: 'VI. Content Blocks', idx: [18,19,20,21,22] },
  ];
  return (
    <div className="page">
      <div className="header">
        <h1>Display<br/><em>& data.</em></h1>
        <div className="sub">A systematic catalogue of {total} display primitives across {cats.length} families — the containers, tables, and indicators that surface information.</div>
      </div>
      <div className="meta-row">
        <span><span className="dot"/>{cats.length} Categories</span>
        <span><span className="dot"/>{total} Variants</span>
        <span><span className="dot"/>{groups.length} Thematic Groups</span>
        <span><span className="dot"/>Live tweakable</span>
        <span style={{marginLeft:'auto'}}>Vol. 07 · Diamond · 2026</span>
      </div>
      <div className="toc">
        {cats.map((c,i)=>(<a key={c.k} href={`#sec-${c.k}`}><span>{c.n}</span><span className="n">{String(i+1).padStart(2,'0')} / 6</span></a>))}
      </div>
      {groups.map((g, gi) => (
        <div key={g.title}>
          <div style={{margin:'100px 0 0', paddingBottom:14, borderBottom:'2px solid var(--fg)', display:'flex', alignItems:'baseline', gap:20, flexWrap:'wrap'}}>
            <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, letterSpacing:'0.2em', color:'var(--accent)'}}>GROUP {String(gi+1).padStart(2,'0')}</span>
            <span style={{fontFamily:'Fraunces, serif', fontSize:28, fontStyle:'italic', fontWeight:500, letterSpacing:'-0.02em'}}>{g.title}</span>
            <span style={{marginLeft:'auto', fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--fg-3)', letterSpacing:'0.14em', textTransform:'uppercase'}}>{g.idx.map(i=>cats[i].n).join(' · ')}</span>
          </div>
          {g.idx.map(ci => {
            const c = cats[ci];
            return (
              <section key={c.k} id={`sec-${c.k}`} className="section" data-screen-label={`${String(ci+1).padStart(2,'0')} ${c.n}`}>
                <div className="section-head"><span className="num">§{String(ci+1).padStart(2,'0')}</span><h2>{c.n}</h2><span className="desc">{c.desc} · {c.v.length} variations</span></div>
                <div className="grid">
                  {c.v.map((V, i) => (
                    <div key={i} className="cell">
                      <span className="label">{c.k}-{String(i+1).padStart(2,'0')}</span>
                      <span className="idx">{String(ci+1).padStart(2,'0')}·{i+1}</span>
                      <div className="stage"><V/></div>
                      <div className="footnote">{c.notes[i]}</div>
                    </div>
                  ))}
                </div>
              </section>
            );
          })}
        </div>
      ))}
      <div style={{marginTop:100, paddingTop:32, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', fontFamily:'JetBrains Mono, monospace', fontSize:11, textTransform:'uppercase', letterSpacing:'0.14em', color:'var(--fg-2)'}}>
        <span>— Fin —</span>
        <span>{total} display patterns · {cats.length} sections</span>
        <span>Toggle Tweaks to customize</span>
      </div>
      {editMode && tweaksOpen && <Tweaks t={t} setT={setT} onClose={()=>setTweaksOpen(false)}/>}
      {editMode && !tweaksOpen && <button className="fab" onClick={()=>setTweaksOpen(true)}>◆</button>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
