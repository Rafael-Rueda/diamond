<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Gallery — 60 Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #f5f3ef;
    --bg-2: #ebe8e1;
    --fg: #1a1917;
    --fg-2: #6b6862;
    --border: #d9d5cc;
    --accent: #2b7fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  /* ------------ PAGE LAYOUT ------------ */
  .page {
    max-width: 1480px;
    margin: 0 auto;
    padding: 56px 48px 120px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 56px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin: 0;
  }
  .header h1 em { font-style: italic; color: var(--fg-2); font-weight: 400; }
  .header .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-2);
    max-width: 320px;
    text-align: right;
    line-height: 1.6;
  }
  .meta-row {
    display: flex; gap: 24px; margin-bottom: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .meta-row span { display: inline-flex; align-items: center; gap: 8px; }
  .meta-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* ------------ SECTION ------------ */
  .section { margin-bottom: 72px; }
  .section-head {
    display: flex; align-items: baseline; gap: 16px;
    padding-bottom: 14px; margin-bottom: 32px;
    border-bottom: 1px dashed var(--border);
  }
  .section-head .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--fg-2);
    letter-spacing: 0.1em;
  }
  .section-head h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .section-head .desc {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ------------ GRID ------------ */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

  .cell {
    background: var(--bg);
    padding: 48px 32px 32px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    min-height: 240px;
    position: relative;
    transition: background 0.2s;
  }
  .cell:hover { background: var(--bg-2); }
  .cell .label {
    position: absolute;
    top: 14px; left: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .cell .idx {
    position: absolute;
    top: 14px; right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-2);
    letter-spacing: 0.1em;
  }
  .cell .btn-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 20px 0;
  }
  .cell .footnote {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 12px;
    min-height: 14px;
  }

  /* ------------ TWEAKS PANEL ------------ */
  .tweaks {
    position: fixed;
    right: 24px; bottom: 24px;
    width: 320px;
    background: #1a1917;
    color: #f5f3ef;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    font-family: 'Inter', sans-serif;
    z-index: 9999;
    overflow: hidden;
    transform: translateY(0);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .tweaks.hidden { display: none; }
  .tweaks-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tweaks-header .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .tweaks-header .close {
    background: none; border: none; color: rgba(245,243,239,0.5);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 4px;
  }
  .tweaks-body { padding: 16px; max-height: 60vh; overflow-y: auto; }
  .tweaks-row { margin-bottom: 16px; }
  .tweaks-row:last-child { margin-bottom: 0; }
  .tweaks-row label {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,243,239,0.7);
    margin-bottom: 8px;
  }
  .tweaks-row label .val { color: var(--accent); }
  .tweaks-row input[type="range"] {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
  }
  .tweaks-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #f5f3ef; cursor: pointer;
  }
  .tweaks-row input[type="text"] {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #f5f3ef; padding: 8px 10px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
  }
  .tweaks-row input[type="text"]:focus { border-color: var(--accent); }
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch {
    aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: #f5f3ef; }
  .font-picker { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .font-btn {
    padding: 8px 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(245,243,239,0.8); border-radius: 6px; cursor: pointer;
    font-size: 12px; text-align: center;
  }
  .font-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .fab {
    position: fixed; right: 24px; bottom: 24px;
    width: 48px; height: 48px; border-radius: 50%;
    background: #1a1917; color: #f5f3ef; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 9998;
    font-size: 18px;
  }
  .fab.hidden { display: none; }

  /* ------------ TOAST ------------ */
  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1917; color: #f5f3ef; padding: 10px 16px;
    border-radius: 8px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 10000;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }

  /* ================================================================= */
  /*                      BUTTON VARIANT STYLES                        */
  /* ================================================================= */

  /* All variants use these CSS vars, set on the stage wrapper */
  .btn {
    --c: var(--accent);
    --c-dark: color-mix(in oklab, var(--c) 80%, black);
    --c-light: color-mix(in oklab, var(--c) 30%, white);
    --c-fg: #ffffff;
    font-family: var(--btn-font, 'Inter'), sans-serif;
    font-size: var(--btn-size, 15px);
    font-weight: var(--btn-weight, 500);
    border-radius: var(--btn-radius, 10px);
    padding: var(--btn-pady, 12px) var(--btn-padx, 22px);
    cursor: pointer;
    border: none;
    outline: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.01em;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    text-decoration: none;
    user-select: none;
    white-space: nowrap;
  }

  /* 01 — Solid */
  .v-solid { background: var(--c); color: var(--c-fg); }
  .v-solid:hover { background: var(--c-dark); transform: translateY(-1px); }

  /* 02 — Outline */
  .v-outline { background: transparent; color: var(--c); border: 1.5px solid var(--c); }
  .v-outline:hover { background: var(--c); color: var(--c-fg); }

  /* 03 — Ghost */
  .v-ghost { background: transparent; color: var(--c); }
  .v-ghost:hover { background: color-mix(in oklab, var(--c) 12%, transparent); }

  /* 04 — Soft */
  .v-soft { background: color-mix(in oklab, var(--c) 15%, white); color: var(--c-dark); }
  .v-soft:hover { background: color-mix(in oklab, var(--c) 25%, white); }

  /* 05 — Pill */
  .v-pill { background: var(--c); color: var(--c-fg); border-radius: 999px; padding: 12px 28px; }
  .v-pill:hover { background: var(--c-dark); }

  /* 06 — 3D / Neobrutal */
  .v-3d {
    background: var(--c); color: var(--c-fg);
    border: 2px solid #1a1917;
    box-shadow: 4px 4px 0 0 #1a1917;
    border-radius: 6px;
    font-weight: 700;
  }
  .v-3d:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 0 #1a1917; }
  .v-3d:active { transform: translate(4px, 4px); box-shadow: 0 0 0 0 #1a1917; }

  /* 07 — Gradient shine */
  .v-gradient {
    color: var(--c-fg); border-radius: 10px;
    background: linear-gradient(135deg, var(--c), color-mix(in oklab, var(--c) 60%, #000));
    box-shadow: 0 4px 14px -2px color-mix(in oklab, var(--c) 40%, transparent);
  }
  .v-gradient:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -4px color-mix(in oklab, var(--c) 50%, transparent); }

  /* 08 — Glass */
  .v-glass {
    background: color-mix(in oklab, var(--c) 20%, transparent);
    backdrop-filter: blur(10px);
    color: var(--c);
    border: 1px solid color-mix(in oklab, var(--c) 30%, transparent);
    border-radius: 12px;
  }
  .v-glass:hover { background: color-mix(in oklab, var(--c) 30%, transparent); }

  /* 09 — Glow / Neon */
  .v-glow {
    background: var(--c); color: var(--c-fg);
    box-shadow: 0 0 24px color-mix(in oklab, var(--c) 50%, transparent),
                0 0 0 1px color-mix(in oklab, var(--c) 80%, transparent);
  }
  .v-glow:hover {
    box-shadow: 0 0 36px color-mix(in oklab, var(--c) 70%, transparent),
                0 0 0 1px var(--c);
  }

  /* 10 — Icon chip */
  .v-iconchip {
    background: var(--c); color: var(--c-fg);
    padding-left: 14px;
    border-radius: 999px;
  }
  .v-iconchip .icon-wrap {
    width: 22px; height: 22px; border-radius: 50%;
    background: color-mix(in oklab, white 30%, transparent);
    display: flex; align-items: center; justify-content: center;
    margin-right: -6px;
  }

  /* 11 — Underline link */
  .v-underline {
    background: transparent; color: var(--c);
    padding: 4px 0; border-radius: 0;
    position: relative; font-weight: 500;
  }
  .v-underline::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 1.5px; background: var(--c);
    transform-origin: right;
    transition: transform 0.3s;
  }
  .v-underline:hover::after { transform-origin: left; transform: scaleX(1); }

  /* 12 — Retro tab */
  .v-retro {
    background: var(--c); color: var(--c-fg);
    border-radius: 4px;
    border-top: 1px solid color-mix(in oklab, white 30%, var(--c));
    border-left: 1px solid color-mix(in oklab, white 30%, var(--c));
    border-right: 2px solid var(--c-dark);
    border-bottom: 2px solid var(--c-dark);
    font-weight: 600;
  }
  .v-retro:active {
    border-top: 2px solid var(--c-dark);
    border-left: 2px solid var(--c-dark);
    border-right: 1px solid color-mix(in oklab, white 30%, var(--c));
    border-bottom: 1px solid color-mix(in oklab, white 30%, var(--c));
  }

  /* 13 — Sliding fill */
  .v-fill {
    background: transparent; color: var(--c);
    border: 1.5px solid var(--c);
    overflow: hidden; z-index: 0;
  }
  .v-fill::before {
    content: ''; position: absolute; inset: 0;
    background: var(--c); z-index: -1;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .v-fill:hover { color: var(--c-fg); }
  .v-fill:hover::before { transform: translateX(0); }

  /* 14 — Dashed */
  .v-dashed {
    background: color-mix(in oklab, var(--c) 8%, transparent);
    color: var(--c);
    border: 1.5px dashed var(--c);
  }
  .v-dashed:hover { background: color-mix(in oklab, var(--c) 20%, transparent); }

  /* 15 — Double border */
  .v-double {
    background: transparent; color: var(--c);
    border: 3px double var(--c);
    font-weight: 600;
  }
  .v-double:hover { background: var(--c); color: var(--c-fg); }

  /* 16 — Shadow lift */
  .v-lift {
    background: white; color: var(--c-dark);
    border: 1px solid var(--border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .v-lift:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px -4px color-mix(in oklab, var(--c) 25%, transparent);
    border-color: var(--c);
    color: var(--c);
  }

  /* 17 — Split / Dual action */
  .v-split {
    padding: 0; background: var(--c); color: var(--c-fg);
    display: inline-flex; overflow: hidden;
  }
  .v-split .main { padding: 12px 20px; }
  .v-split .sep { width: 1px; background: color-mix(in oklab, white 30%, transparent); }
  .v-split .more { padding: 12px 12px; cursor: pointer; }
  .v-split:hover { background: var(--c-dark); }

  /* 18 — Notched corner */
  .v-notch {
    background: var(--c); color: var(--c-fg);
    border-radius: 0;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .v-notch:hover { background: var(--c-dark); }

  /* 19 — Arrow slide */
  .v-arrow {
    background: var(--c); color: var(--c-fg);
    padding-right: 40px;
    overflow: hidden;
  }
  .v-arrow .arrow {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    transition: transform 0.2s;
  }
  .v-arrow:hover .arrow { transform: translateY(-50%) translateX(4px); }

  /* 20 — Ticket / Coupon */
  .v-ticket {
    background: var(--c); color: var(--c-fg);
    border-radius: 10px;
    position: relative;
    padding: 12px 26px;
    font-weight: 600;
  }
  .v-ticket::before, .v-ticket::after {
    content: ''; position: absolute; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg);
  }
  .v-ticket::before { left: -4px; }
  .v-ticket::after { right: -4px; }

  /* 21 — Magnetic stripe / Layer */
  .v-layer {
    background: var(--c); color: var(--c-fg);
    box-shadow:
      0 0 0 0 transparent,
      4px 4px 0 -1px var(--c-light),
      8px 8px 0 -2px color-mix(in oklab, var(--c) 20%, white);
  }
  .v-layer:hover {
    transform: translate(-2px, -2px);
    box-shadow:
      0 0 0 0 transparent,
      6px 6px 0 -1px var(--c-light),
      12px 12px 0 -2px color-mix(in oklab, var(--c) 20%, white);
  }

  /* 22 — Terminal / Command */
  .v-terminal {
    background: #1a1917; color: var(--c);
    font-family: 'JetBrains Mono', monospace;
    border-radius: 6px;
    padding: 10px 18px;
    border: 1px solid #2d2c28;
    font-weight: 500;
  }
  .v-terminal::before {
    content: '$'; color: var(--c-light); margin-right: 8px;
  }
  .v-terminal:hover { background: #262521; }

  /* 23 — Aurora gradient border */
  .v-aurora {
    background: white; color: var(--fg);
    border-radius: 10px;
    position: relative;
    padding: 12px 22px;
    border: 2px solid transparent;
    background:
      linear-gradient(white, white) padding-box,
      linear-gradient(90deg, var(--c), color-mix(in oklab, var(--c) 50%, magenta), var(--c)) border-box;
    background-size: 100% 100%, 200% 200%;
    animation: auroraShift 4s linear infinite;
    font-weight: 600;
  }
  @keyframes auroraShift {
    0% { background-position: 0% 50%, 0% 50%; }
    100% { background-position: 0% 50%, 200% 50%; }
  }

  /* 24 — Minimal caret */
  .v-caret {
    background: transparent; color: var(--fg);
    border-bottom: 1px solid var(--fg);
    border-radius: 0;
    padding: 6px 0;
    padding-right: 4px;
    font-weight: 500;
  }
  .v-caret .c { color: var(--c); font-weight: 700; margin-right: 6px; }
  .v-caret:hover { color: var(--c); border-color: var(--c); }

  /* 25 — Stamped / Embossed */
  .v-stamp {
    background: var(--c-light); color: var(--c-dark);
    border-radius: 8px;
    box-shadow:
      inset 2px 2px 4px rgba(0,0,0,0.08),
      inset -2px -2px 4px rgba(255,255,255,0.6);
    font-weight: 600;
    border: 1px solid color-mix(in oklab, var(--c) 20%, white);
  }
  .v-stamp:hover {
    box-shadow:
      inset 1px 1px 2px rgba(0,0,0,0.15),
      inset -1px -1px 2px rgba(255,255,255,0.4);
  }

  /* 26 — Pixel / 8-bit */
  .v-pixel {
    background: var(--c); color: var(--c-fg);
    font-family: 'JetBrains Mono', monospace;
    border-radius: 0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    padding: 12px 22px;
    box-shadow:
      0 -4px 0 0 color-mix(in oklab, white 20%, var(--c)) inset,
      0 4px 0 0 var(--c-dark) inset,
      4px 0 0 0 var(--c-dark) inset,
      -4px 0 0 0 color-mix(in oklab, white 15%, var(--c)) inset;
  }
  .v-pixel:active { transform: translateY(2px); }

  /* 27 — Circular icon only */
  .v-circle {
    width: 52px; height: 52px; padding: 0;
    border-radius: 50%;
    background: var(--c); color: var(--c-fg);
    box-shadow: 0 4px 12px -2px color-mix(in oklab, var(--c) 40%, transparent);
  }
  .v-circle:hover { transform: scale(1.05); }

  /* 28 — Segmented status */
  .v-status {
    background: color-mix(in oklab, var(--c) 10%, white);
    color: var(--c-dark);
    border-radius: 999px;
    padding: 8px 16px 8px 10px;
    font-weight: 500;
    border: 1px solid color-mix(in oklab, var(--c) 25%, white);
  }
  .v-status .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--c);
    box-shadow: 0 0 8px var(--c);
    display: inline-block;
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* 29 — Handwritten sketch */
  .v-sketch {
    background: transparent; color: var(--fg);
    border: 2px solid var(--c);
    border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    padding: 12px 24px;
  }
  .v-sketch:hover {
    border-radius: 15px 225px 15px 255px/225px 15px 255px 15px;

  .v-tape {

function ButtonPreview({ v, label, accent }) {
  const lbl = v.label !== null && v.label !== undefined ? v.label : label;
  const IconComp = v.icon ? Icn[v.icon] : null;

  if (v.custom === 'split') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="main">{lbl}</span>
        <span className="sep"></span>
        <span className="more"><Icn.Down/></span>
      </button>
    );
  }
  if (v.custom === 'iconchip') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="icon-wrap"><Icn.Arrow/></span>
        {lbl}
      </button>
    );
  }
  if (v.custom === 'status') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="led"></span>
        {lbl}
      </button>
    );
  }
  if (v.custom === 'darkcard') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="dot"></span>
        {lbl}
      </button>
    );
  }
  if (v.custom === 'caret') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="c">→</span>{lbl}
      </button>
    );
  }
  if (v.custom === 'arrow') {
    return (
      <button className={`btn ${v.class}`}>
        {lbl}
        <span className="arrow">→</span>
      </button>
    );
  }
  if (v.custom === 'trace') {
    return (
      <button className={`btn ${v.class}`}>
        <svg preserveAspectRatio="none"><rect /></svg>
        {lbl}
      </button>
    );
  }
  if (v.custom === 'wave') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="bars"><span/><span/><span/><span/><span/></span>
        {lbl}
      </button>
    );
  }
  if (v.custom === 'morse') {
    return (
      <button className={`btn ${v.class}`}>
        {lbl}
        <span className="dots"><span/><span/><span/><span/></span>
      </button>
    );
  }
  if (v.custom === 'reveal') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="txt">{lbl}</span>
        <span className="txt-alt">{lbl} →</span>
      </button>
    );
  }
  if (v.custom === 'gooey') {
    return (
      <button className={`btn ${v.class}`}>
        {lbl}
        <span className="pip">→</span>
      </button>
    );
  }
  if (v.custom === 'counter') {
    return (
      <button className={`btn ${v.class}`}>
        {lbl}
        <span className="num">12</span>
      </button>
    );
  }
  if (v.custom === 'url') {
    return (
      <button className={`btn ${v.class}`}>
        <span className="slash">/</span>{lbl}
      </button>
    );
  }

  return (
    <button className={`btn ${v.class}`}>
      {IconComp && v.id !== 'circle' ? <IconComp/> : null}
      {v.id === 'circle' ? <IconComp/> : lbl}
    </button>
  );
}

function Tweaks({ state, setState, open, setOpen }) {
  if (!open) {
    return <button className="fab" onClick={() => setOpen(true)} title="Open tweaks">✎</button>;
  }
  const set = (k, v) => {
    setState(prev => ({ ...prev, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <div className="tweaks">
      <div className="tweaks-header">
        <span className="title">Tweaks</span>
        <button className="close" onClick={() => setOpen(false)}>×</button>
      </div>
      <div className="tweaks-body">

        <div className="tweaks-row">
          <label>Label <span className="val">text</span></label>
          <input type="text" value={state.label} onChange={e => set('label', e.target.value)} />
        </div>

        <div className="tweaks-row">
          <label>Accent <span className="val">{state.accent}</span></label>
          <div className="swatches">
            {SWATCHES.map(s => (
              <div key={s}
                   className={`swatch ${state.accent === s ? 'active' : ''}`}
                   style={{ background: s }}
                   onClick={() => set('accent', s)} />
            ))}
          </div>
          <input type="text" value={state.accent} onChange={e => set('accent', e.target.value)} style={{marginTop: 8}}/>
        </div>

        <div className="tweaks-row">
          <label>Font <span className="val">{state.font}</span></label>
          <div className="font-picker">
            {FONTS.map(f => (
              <div key={f} className={`font-btn ${state.font === f ? 'active' : ''}`} onClick={() => set('font', f)}>{f}</div>
            ))}
          </div>
        </div>

        <div className="tweaks-row">
          <label>Size <span className="val">{state.size}px</span></label>
          <input type="range" min="11" max="22" value={state.size} onChange={e => set('size', +e.target.value)} />
        </div>

        <div className="tweaks-row">
          <label>Radius <span className="val">{state.radius}px</span></label>
          <input type="range" min="0" max="28" value={state.radius} onChange={e => set('radius', +e.target.value)} />
        </div>

        <div className="tweaks-row">
          <label>Weight <span className="val">{state.weight}</span></label>
          <input type="range" min="300" max="800" step="100" value={state.weight} onChange={e => set('weight', +e.target.value)} />
        </div>

        <div className="tweaks-row">
          <label>Padding X <span className="val">{state.padX}px</span></label>
          <input type="range" min="10" max="48" value={state.padX} onChange={e => set('padX', +e.target.value)} />
        </div>

        <div className="tweaks-row">
          <label>Padding Y <span className="val">{state.padY}px</span></label>
          <input type="range" min="6" max="24" value={state.padY} onChange={e => set('padY', +e.target.value)} />
        </div>

      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editAvail, setEditAvail] = useState(false);
  const [toast, setToast] = useState('');

  // Listen for host edit-mode toggles
  useEffect(() => {
    const onMsg = (e) => {
      const t = e.data && e.data.type;
      if (t === '__activate_edit_mode') { setTweaksOpen(true); setEditAvail(true); }
      if (t === '__deactivate_edit_mode') { setTweaksOpen(false); }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Apply CSS vars globally
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--accent', state.accent);
    root.style.setProperty('--btn-size', state.size + 'px');
    root.style.setProperty('--btn-radius', state.radius + 'px');
    root.style.setProperty('--btn-weight', state.weight);
    root.style.setProperty('--btn-padx', state.padX + 'px');
    root.style.setProperty('--btn-pady', state.padY + 'px');
    root.style.setProperty('--btn-font', state.font);
  }, [state]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 1400);
  };

  // Group variants
  const groups = {};
  VARIANTS.forEach((v, i) => {
    if (!groups[v.group]) groups[v.group] = [];
    groups[v.group].push({ ...v, _i: i });
  });

  const groupOrder = ['Solid & Filled', 'Outlined', 'Subtle', 'Expressive', 'Shaped', 'Utility', 'Motion', 'Reactive', 'Surface', 'Identity'];

  return (
    <>
      <div className="page">

        <header className="header">
          <h1>Button <em>gallery.</em></h1>
          <div className="sub">36 reusable variants — customize color, type &amp; shape via the Tweaks panel.</div>
        </header>

        <div className="meta-row">
          <span><span className="dot" style={{background: state.accent}}></span>Accent {state.accent}</span>
          <span>Font {state.font}</span>
          <span>{VARIANTS.length} variants</span>
          <span>Click any to copy class</span>
        </div>

        {groupOrder.map((g, gi) => (
          <section key={g} className="section">
            <div className="section-head">
              <span className="num">§{String(gi + 1).padStart(2, '0')}</span>
              <h2>{g}</h2>
              <span className="desc">{groups[g].length} variants</span>
            </div>
            <div className="grid">
              {groups[g].map(v => (
                <div key={v.id} className="cell" onClick={() => {
                  navigator.clipboard && navigator.clipboard.writeText(`class="btn ${v.class}"`);
                  showToast(`Copied .${v.class}`);
                }}>
                  <span className="label">{v.name}</span>
                  <span className="idx">{String(v._i + 1).padStart(2, '0')}</span>
                  <div className="btn-stage">
                    <ButtonPreview v={v} label={state.label} accent={state.accent} />
                  </div>
                  <div className="footnote">{v.note}</div>
                </div>
              ))}
            </div>
          </section>
        ))}

        <footer style={{marginTop: 80, paddingTop: 32, borderTop: '1px solid var(--border)', fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--fg-2)', letterSpacing: '0.1em', textTransform: 'uppercase', display:'flex', justifyContent:'space-between'}}>
          <span>Button gallery · v1.0</span>
          <span>Open the Tweaks panel to customize →</span>
        </footer>
      </div>

      <Tweaks state={state} setState={setState} open={tweaksOpen} setOpen={setTweaksOpen} />

      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
